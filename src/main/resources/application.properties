spring.application.name=autoescola

server.port=8080

spring.datasource.url=jdbc:mysql://localhost/auto_escola
## todo alterar user para uso
spring.datasource.username= root
## todo alterar senha para uso
spring.datasource.password= senhaDeExemplo
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

## desabilitar log de erros no corpo do json para requisicoes
server.error.include-stacktrace = never

api.security.token.secret=${JWT_TOKEN:4206769}

