spring.application.name=autoescola

server.port=8080

spring.datasource.url=jdbc:mysql://localhost/auto_escola
## todo alterar user para uso
spring.datasource.username= root
## todo alterar senha para uso
spring.datasource.password= fiap
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

## desabilitar log de erros para requisicoes
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

api.security.token.secret=${JWT_TOKEN:4206769}

## habilitar log de autenticacaoes
logging.level.org.springframework.security=DEBUG

## tratar rotas inexistentes
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false